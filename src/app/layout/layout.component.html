<div class="main-layout d-flex">

  <!-- SIDEBAR -->
  <div class="sidebar" [class.collapsed]="isCollapsed">

    <!-- Logo -->
    <div class="logo-wrapper d-flex align-items-center px-2">
      <div class="logo-box">Test</div>
      <!-- <span class="logo-text ms-2">OPD Management</span> -->
      <span class="logo-text ms-2">Tes</span>
    </div>



    <ul class="nav flex-column mt-4">
      <ng-container *ngFor="let menu of menus">

        <!-- Parent Menu -->
        <li class="nav-item" *ngIf="menu.children && menu.children.length > 0">
          <a class="nav-link menu-item">
            <i class="bi bi-grid"></i>
            <span class="menu-text ms-3">{{ menu.menuname }}</span>
          </a>

          <!-- Child Menus -->
          <ul class="nav flex-column ms-3">
            <li class="nav-item" *ngFor="let child of menu.children">
              <a [routerLink]="child.menuurl" routerLinkActive="active-menu" class="nav-link menu-item">
                <i class="bi bi-grid"></i>
                <span class="menu-text ms-3">{{ child.menuname }}</span>
              </a>
            </li>
          </ul>
        </li>

      </ng-container>
    </ul>

  </div>

  <!-- CONTENT AREA -->
  <div class="content flex-grow-1">

    <!-- HEADER -->
    <nav class="top-header d-flex justify-content-between align-items-center px-4">

      <div class="d-flex align-items-center">

        <button class="btn btn-light me-3" (click)="toggle()">
          <i class="bi bi-list fs-5"></i>
        </button>

        <h5 class="mb-0 fw-bold">Chat GPT</h5>

      </div>

      <div class="d-flex align-items-center gap-3">

        <select class="form-select form-select-sm">
          <option>City Health Hospital</option>
        </select>

        <select class="form-select form-select-sm">
          <option>Main Campus</option>
        </select>

        <i class="bi bi-bell fs-5 position-relative">
          <span class="notification-dot"></span>
        </i>

        <div class="d-flex align-items-center gap-2">
          <div class="avatar">JS</div>
          <div style="width: 130px;">
            <div class="fw-semibold small">Dr. John Smith</div>
            <div class="text-muted small">Receptionist</div>
          </div>
        </div>

      </div>

    </nav>

    <!-- ROUTER CONTENT -->
    <div class="content-body p-4">
      <router-outlet></router-outlet>
