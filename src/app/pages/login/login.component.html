<div class="login-wrapper">
  <div class="login-card shadow-lg">

    <!-- Logo -->
    <div class="text-center mb-3">
      <div class="logo-box">
        <i class="bi bi-heart-pulse"></i>
      </div>
    </div>

    <!-- Title -->
    <h3 class="text-center fw-bold">Chat GPT</h3>
    <p class="text-center text-muted small mb-4">
      Sign in to access your dashboard
    </p>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" class="form-control custom-input" formControlName="username"
          placeholder="Enter your username" />
      </div>

      <div class="mb-4 position-relative">
        <label class="form-label fw-semibold">Password</label>
        <input [type]="showPassword ? 'text' : 'password'" class="form-control custom-input pe-5"
          formControlName="password" placeholder="Enter your password" />
      </div>

      <button type="submit" class="btn login-btn w-100">
        Sign In
      </button>

    </form>


  </div>
</div>
