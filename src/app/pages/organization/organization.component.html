  <!-- Button Row -->
  <div class="d-flex justify-content-end mb-3">
    <button class="btn btn-dark px-4"  (click)="openModal()">
      +Add Organization
    </button>
  </div>

<div class="search-container">
    <input type="text" class="form-control search-input" placeholder="Search organizations..." [(ngModel)]="searchText"
        (ngModelChange)="onSearchChange($event)" />
    <i class="bi bi-search search-icon"></i>
</div>

<br>
<br>



<ag-grid-angular
    style="width: 100%; height: 500px;"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    (gridReady)="onGridReady($event)"
    [pagination]="true"
    [paginationPageSize]="10"
    [theme]="myTheme"
    [domLayout]="'autoHeight'">
</ag-grid-angular>


<!-- Bootstrap Modal -->
<div
  class="modal fade"
  id="organizationModal"
  tabindex="-1"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered custom-modal">
    <div class="modal-content rounded-2">

      <!-- Header -->
      <div class="modal-header mb-0 border-0">
        <div>
          <p class="modal-title fw-bold">Add New Organization</p>
          <small class="text-muted">Create a new healthcare organization</small>
        </div>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>

      <!-- Body -->
      <div class="modal-body">

        <form [formGroup]="organizationForm">

          <!-- Organization Name -->
          <div class="mb-2">
            <label class="form-label fw-semibold">Organization Name</label>
            <input
              type="text"
              class="form-control form-control-sm"
              placeholder="Enter organization name"
              formControlName="OrgName"
            />
            <div *ngIf="organizationForm.get('OrgName')?.invalid && organizationForm.get('OrgName')?.touched" class="text-danger small mt-1">
                Organization Name is required
            </div>
            
          </div>

          <!-- Logo -->
          <div class="mb-2">
            <label class="form-label fw-semibold">Logo</label>
            <input
              type="file"
              class="form-control form-control-sm"
              (change)="onFileChange($event)"
            />
            
          </div>

          <!-- Address -->
          <div class="mb-2">
            <label class="form-label fw-semibold">Address</label>
            <textarea
              class="form-control form-control-sm"
              rows="3"
              placeholder="Enter full Address"
              formControlName="Address"
            ></textarea>
            <div *ngIf="organizationForm.get('Address')?.invalid && organizationForm.get('Address')?.touched" class="text-danger small mt-1">
                Address Name is required
            </div>
          </div>

          <!-- Contact + Email -->
          <div class="row">
            <div class="col-md-6 mb-2">
              <label class="form-label fw-semibold">Contact Number</label>
              <input
                type="text"
                class="form-control form-control-sm"
                placeholder="+91 9876543210"
                formControlName="ContactNo"
              />
            </div>

            <div class="col-md-6 mb-2">
              <label class="form-label fw-semibold">Email</label>
              <input
                type="Email"
                class="form-control form-control-sm"
                placeholder="Email@example.com"
                formControlName="Email"
              />
            </div>
          </div>

          <!-- GST -->
          <div class="mb-1">
            <label class="form-label fw-semibold">GST Number</label>
            <input
              type="text"
              class="form-control form-control-sm"
              placeholder="Enter GST number"
              formControlName="Gstnumber"
            />
          </div>

        </form>
      </div>

      <!-- Footer -->
      <div class="modal-footer border-0">
        <button class="btn btn-outline-secondary btn-sm" (click)="closeModal()">
          Cancel
        </button>
        <button
          class="btn btn-dark btn-sm px-3"
          [disabled]="organizationForm.invalid"
          (click)="saveOrganization()"
        >
          Save Organization
        </button>
      </div>

    </div>
  </div>
</div>
